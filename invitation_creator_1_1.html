<!--
The purpose of this form is to provide a standalone, client-side HTML and JavaScript form that
creates Electronic Invitatations in the style of the depreciated "AFIT E-Invites" website. 

This form is based on the instructions provided at this link: 
https://dev.to/wyattdave/how-to-create-your-own-form-with-power-automate-4546

JavaScript for this form was created and tested with the support of Gemini Enterprise (Gemini 3.5 Flash).

Sample CSS from here: https://formbold.com/templates 

HTML Accessibility Standards: https://www.w3.org/WAI/standards-guidelines/ 
-->

<!-- Scripts -->

<script>
  
  /* -- START: Prepopulate Fields - Hours, Minutes, and Font Size -- */

  // Hours and minutes HTML references
  const minutes_select = document.getElementById('event_minutes');
  const hours_select = document.getElementById('event_hours');
  const font_size_select = document.getElementById('font_size');
  
  // Populate hours
  for (let i = 0; i <= 59; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    // Formats single digits to 2 digits (e.g., "0" becomes "00")
    opt.textContent = i.toString().padStart(2, '0'); 
    minutes_select.appendChild(opt);
  }

  // Populate minutes
  for (let i = 0; i <= 23; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    // Formats single digits to 2 digits (e.g., "0" becomes "00")
    opt.textContent = i.toString().padStart(2, '0'); 
    hours_select.appendChild(opt);
  }

  // Populate font size
  for (let i = 10; i <= 32; i++) {
    const opt = document.createElement('option');
    opt.value = i; 
    opt.textContent = i.toString(); 
    font_size_select.appendChild(opt);
  }

  /* -- END: Prepopulate Fields - Hours, Minutes, and Font Size -- */

  /* -- START: Preview Listeners - Font (size and color) and Image Preview -- */

  // Change font preview
  const text_color = document.getElementById('border_color');
  const font_type = document.getElementById('font_type');
  const preview_bold = document.getElementById('preview_bold');
  const preview_italics = document.getElementById('preview_italics');
  
  // add a listener
  
  text_color.addEventListener('input', function(){
		preview_bold.style.color = text_color.value;
		preview_italics.style.color = text_color.value;
  });

  font_type.addEventListener('input', function(){
		preview_bold.style.fontFamily = font_type.value;
		preview_italics.style.fontFamily = font_type.value;
  });

  font_size_select.addEventListener('input', function(){
		preview_bold.style.fontSize = font_size_select.value + "pt";
		preview_italics.style.fontSize = font_size_select.value + "pt";
  });

   // Load image preview
   const image_input = document.getElementById('file_upload');
   const image_preview = document.getElementById('image_preview');

   image_input.addEventListener('change', function(event) {
      const file = event.target.files[0]; // Get the selected file

      if (file) {
      // Generate a temporary local object URL
         const objectURL = URL.createObjectURL(file); 
                
         // Assign the URL to the image src and make it visible
         image_preview.src = objectURL;
         image_preview.style.display = 'block';
      }
   });

  /* -- END: Preview Listeners - Font (size and color) and Image Preview -- */
  
  /* -- START: Dynamic Fields Listeners - Event Type-specific Fields -- */
  
  const eventTypeSelect = document.getElementById('event_type');
  const conditionalContainer = document.getElementById('conditional_fields_container');

  // add a listener for a change to the Event Type field
  eventTypeSelect.addEventListener('change', function() {
    updateConditionalFields(this.value);
  });

  /**
   * Clears the conditional container and adds new fields based on the selected event type.
   * @param {string} eventType - The value of the selected option (e.g., 'change_of_command').
   */
  function updateConditionalFields(eventType) {
    // First, clear any existing fields from the container
    conditionalContainer.innerHTML = '';

    let htmlToInsert = '';

    // Use a switch statement to determine which fields to create
    switch (eventType) {

      case 'assumption_of_command':
      case 'change_of_command':
				htmlToInsert = `
          <div class="formbold-input-flex">
            <div>
	      <input type="text" id="inbound_cc" name="inbound_cc" class="formbold-form-input" placeholder="Captain James T. Kirk" required>
              <label for="inbound_cc" class="formbold-form-label">Inbound Commander*:</label>
            </div>
        `;

				if(eventType == 'change_of_command'){
	  			htmlToInsert += `	
						<div>
			              <input type="text" id="outgoing_cc" name="outgoing_cc" class="formbold-form-input" placeholder="Captain Christopher Pike" required>
			              <label for="outgoing_cc" class="formbold-form-label">Outgoing Commander*:</label>
				    </div>`;
				}
				htmlToInsert += `</div>`
        break;

      case 'assumption_of_command':
        htmlToInsert = `

          <div class="formbold-input-flex">
            <div>
	      			<input type="text" id="inbound_cc" name="inbound_cc" class="formbold-form-input" placeholder="Captain James T. Kirk" required>
              <label for="inbound_cc" class="formbold-form-label">Inbound Commander*:</label>
            </div>
          </div>
        `;
        break;

      case 'promotion_ceremony_individual':
        htmlToInsert = `
	  			<div class="formbold-input-flex">
            <div>
              <input type="text" id="promotee_name" name="promotee_name" class="formbold-form-input" placeholder="Major Peter Parker" required>
              <label for="promotee_name" class="formbold-form-label">Promotee's Name & Rank*:</label>
            </div>
            <div>
              <input type="text" id="new_rank" name="new_rank" class="formbold-form-input" placeholder="Lieutenant Colonel" required>
              <label for="new_rank" class="formbold-form-label">New Rank*:</label>
            </div>
          </div>
        `;
        break;

      case 'retirement_ceremony':
        htmlToInsert = `
	  			<div class="formbold-input-flex">
            <div>
              <input type="text" id="retiree_name" name="retiree_name" class="formbold-form-input" placeholder="CMSgt Ashley Williams" required>
              <label for="retiree_name" class="formbold-form-label">Retiree's Name*:</label>
            </div>
            <div>
              <input type="date" id="retirement_date" name="retirement_date" class="formbold-form-input" placeholder="" required>
              <label for="retirement_date" class="formbold-form-label">Retirement Date*:</label>
            </div>
          </div>
        `;
        break;
      
      case 'promotion_ceremony_group':
        htmlToInsert = `
	  			<div>
		    		<label for="group_promotees_names" class="formbold-form-label" required>Promotees Names*:</label>
	          <textarea id="group_promotees_names" name="group_promotees_names" class="formbold-textarea" placeholder="LCDR Jane Shepard promoting to CDR" rows="10" cols="110"></textarea>
	        </div>
	        <div>
		    		<label for="invite_columns_group_promotion" class="formbold-form-label" required>Number of Columns in Invite*:</label>
	          <select name="invite_columns_group_promotion" id="invite_columns_group_promotion" required>
							<option value="1">1</option>
							<option value="2">2</option>
							<option value="3">3</option>
							<option value="4">4</option>
						</select>
	        </div>
        `;
        break;

      case 'commissioning_ceremony':
        htmlToInsert = `
				  <div>
				    <label for="commissioning_ceremony_names" class="formbold-form-label">Commissioning Names*:</label>
            <textarea id="commissioning_ceremony_names" name="commissioning_ceremony_names" class="formbold-textarea" placeholder="Cadet Alex Ryder..." rows="10" cols="110" required></textarea>
          </div>
          <div>
		    		<label for="invite_columns_commissioning" class="formbold-form-label" required>Number of Columns in Invite*:</label>
	          <select name="invite_columns_commissioning" id="invite_columns_commissioning" required>
							<option value="1">1</option>
							<option value="2">2</option>
							<option value="3">3</option>
							<option value="4">4</option>
						</select>
	        </div>
        `;
        break;

      case 'graduation':
        htmlToInsert = `
				  <div class="formbold-input-flex">
				    <div>
				    	<input type="text" id="class_number" name="class_number" class="formbold-form-input" placeholder="IQT 27-01" required>
							<label for="class_number" class="formbold-form-label">Class Number*:</label>
            </div>
	  			</div>

				  <div>
				    <label for="graduation_names" class="formbold-form-label">Graduation Names*:</label>
			      <textarea id="graduation_names" name="graduation_names" class="formbold-textarea" placeholder="A1C Kelsey Grammer..." rows="10" cols="110" required></textarea>
          </div>

          <div>
		    		<label for="invite_columns_graduation" class="formbold-form-label" required>Number of Columns in Invite*:</label>
	          <select name="invite_columns_graduation" id="invite_columns_graduation" required>
							<option value="1">1</option>
							<option value="2">2</option>
							<option value="3">3</option>
							<option value="4">4</option>
						</select>
	        </div>
        `;
        break;
      
      case 'generic_no_food':
      case 'generic_food':
				/*htmlToInsert = `
				  <div>
				    <label for="event_info" class="formbold-form-label">Event Information*:</label>
            <textarea id="event_info" name="event_info" class="formbold-textarea" placeholder="Type info here..." rows="10" cols="110" required></textarea>
          </div>`;*/

				if( eventType == 'generic_food') {
				  htmlToInsert += `
				    <br>
            <div>
	      			<label for="food_options" class="formbold-form-label">Food Options*:</label>
              <textarea id="food_options" name="food_options" class="formbold-textarea" placeholder="Chicken and rice - $5..." rows="3" cols="110" required></textarea>
          	</div>`;
				}
				break;

      /*case 'awards_ceremony':
				htmlToInsert = `
				  <div>
				    <label for="nominee_names" class="formbold-form-label">Nominee Names:</label>
            <textarea id="nominee_names" name="nominee_names" class="formbold-textarea" placeholder="SGT Ace Levy..." rows="10" cols="110" required></textarea>
          </div>`;
        break; */
	
      // Add more cases here for other event types as needed
      // case 'promotion_ceremony_group':
      //   htmlToInsert = `... your HTML for group promotion ...`;
      //   break;

      default:
        // No additional fields needed for other types
        break;
    }

    // Insert the generated HTML into the container
    if (htmlToInsert) {
      conditionalContainer.innerHTML = htmlToInsert;
    }
  }

  // Optional: Trigger the function on page load to set the initial state
  // based on the default selected event type.
  updateConditionalFields(eventTypeSelect.value);

  /* -- END: Dynamic Fields Listeners - Event Type-specific Fields -- */

  /*--- Add the footer ---*/
  createFooter('footer', 'github_logo.png');

  /* -- START: SessionStorage - Submission to Relevant Template -- */

  // Grab the form element
  const form = document.getElementById('invite_form');

  /**
   * Reads a file and converts it into a Base64 Data URL.
   * This function returns a Promise that resolves with the Data URL string.
   * @param {File} file The file selected by the user.
   * @returns {Promise<string>}
   */
  function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result); // Resolve the promise with the result
          reader.onerror = reject; // Reject the promise if an error occurs
          reader.readAsDataURL(file); // Start reading the file
      });
  }

/**
 * Converts a JavaScript Date object to a 'YYYY-MM-DD' string.
 * @param {Date} date The date object to format.
 * @returns {string} The formatted date string.
 */
function formatDateForInput(date) {
    if (!date || !(date instanceof Date)) return "";
    
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0'); // Months are 0-indexed
    const day = String(date.getDate()).padStart(2, '0');
    
    return `${year}-${month}-${day}`;
}

/**
 * Convert Excel serial date to JavaScript Date
 * @param {number} serial - Excel date serial number
 * @returns {Date} JavaScript Date object
 */
function excelSerialToJSDate(serial) {
    if (typeof serial !== 'number' || isNaN(serial)) {
        throw new Error("Invalid Excel serial date: must be a number.");
    }

    // Excel incorrectly treats 1900 as a leap year, so adjust for that
    const excelEpoch = new Date(Date.UTC(1899, 11, 30)); // Dec 30, 1899
    const jsDate = new Date(excelEpoch.getTime() + serial * 86400000);

    return jsDate;
}

/**
 * Convert Excel serial date to formatted string
 * @param {number} serial - Excel date serial number
 * @param {string} locale - Optional locale (default: 'en-US')
 * @param {object} options - Intl.DateTimeFormat options
 * @returns {string} Formatted date string
 */
function excelDateToString(serial, locale = 'en-US') {
    const date = excelSerialToJSDate(serial);
    return date.toLocaleDateString(locale, {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
    });
}

  /**
   * Handles the upload of an Excel file
   * This function transforms the excel data into JSON format
   * @param {data} 
   * @returns {none}
   */
	function handleExcelUpload(event) {
	  const file = event.target.files[0];
	  if (!file) return;

	  const reader = new FileReader();
	  
	  // Read file as binary string
	  reader.readAsArrayBuffer(file);
	  
	  reader.onload = function(e) {
	    const data = new Uint8Array(e.target.result);
	    const workbook = XLSX.read(data, { type: 'array' });
	    
	    // Grab the first sheet
	    const firstSheetName = workbook.SheetNames[0];
	    const worksheet = workbook.Sheets[firstSheetName];
	    
	    // Convert sheet rows to an array of objects
	    // header: 1 returns a raw 2D array; default converts headers to object keys
	    const jsonData = XLSX.utils.sheet_to_json(worksheet);

	    
	    processImportedData(jsonData);
	  };
	} 

	/**
   * Reads data from an excel spreadsheet and adjusts
   * This function returns a Promise that resolves with the Data URL string.
   * @param {data} 
   * @returns {none}
   */
	function processImportedData(data) {
	  if (!data || data.length === 0) {
	    console.error("No data found in the Excel file.");
	    return;
	  }

	  // 1. Get the first row of data from the Excel sheet.
	  const rowData = data[0];
	  console.log('Imported Row Data:', rowData);

	  // 2. Define the mapping from Excel Header Name -> HTML Input ID
	  //    This must exactly match your spreadsheet's column titles.
	  const fieldMapping = {
		  "Event_Name": "event_name",
		  "Event_Unit": "unit",
		  "Event_Date": "event_date",
		  "RSVP_Date": "rsvp_date",
		  "Start_Hours": "event_hours",

		  "Additional_Information": "additional_information",
		  "Event_Type": "event_type",
		  "RSVP_Link": "rsvp_link"
	  };

	  // 3. Iterate over the mapping and populate the form.
	  for (const excelHeader in fieldMapping) {
	    const inputId = fieldMapping[excelHeader];
	    let value = rowData[excelHeader];

	    // Check if the key exists and has a value in the spreadsheet
	    if (value !== undefined && value !== null) {
	      const inputElement = document.getElementById(inputId);
	      if (inputElement) {
		    if (inputId === 'border_color' || inputId === 'button_color') {
                	// For colors, look up the name and set the hex code
                	const colorName = String(value);

                	}

                	}

				}
				else {
					inputElement.value = 'generic_food';
				}
			}
			else {
                		// For Event Type, convert the display text (e.g., "Change of Command")
                		// into the option value (e.g., "change_of_command").
                		const formattedValue = String(value).toLowerCase().replace(/ /g, '_').replace(/[()]/g, '');

                		// Manually trigger the 'change' event so dynamic fields appear
                		inputElement.dispatchEvent(new Event('change', { bubbles: true }));
			}

            	}

		else if (inputId === 'font_type') {
			let caseValue = "Arial, sans-serif";

        }
		else {

            		if (inputId === "event_date" || inputId === "rsvp_date") {

            if (inputId === 'event_type') {
